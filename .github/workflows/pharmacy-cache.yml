name: Update Pharmacy Cache

on:
  workflow_dispatch:
  schedule:
    # Turkey time 11:50. GitHub may run scheduled jobs a few minutes late.
    - cron: "50 8 * * *"

permissions:
  contents: write

jobs:
  update-pharmacy-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements_bitlis.txt

      - name: Update pharmacy cache
        run: python github_update_pharmacy_cache.py

      - name: Commit cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bitlis_pharmacy_cache.json
          if git diff --cached --quiet; then
            echo "No pharmacy cache changes."
          else
            git commit -m "Update pharmacy cache"
            git push
          fi
