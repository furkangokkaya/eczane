name: Pharmacy cache daily

on:
  schedule:
    # TR 11:50 (UTC+3) -> 08:50 UTC — bot 12:00 paylasimindan once
    - cron: "50 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape duty pharmacies
        run: python github_update_pharmacy_cache.py

      - name: Commit cache if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bitlis_pharmacy_cache.json
          git diff --staged --quiet || git commit -m "chore: nobetci eczane cache $(date -u +%Y-%m-%d)"
          git push
