# UYARI: ubuntu-latest (ABD) eczaneler.gen.tr'de 403 verir.
# Gunluk guncelleme: bot sunucusu — sync_pharmacy_cache.py (ucretsiz).
# Bu workflow yalnizca elle (workflow_dispatch) veya test icin.

name: Pharmacy cache daily

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pharmacy-cache-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape duty pharmacies (3 deneme)
        env:
          TZ: Europe/Istanbul
        run: |
          set -e
          for attempt in 1 2 3; do
            echo "Scrape denemesi $attempt/3"
            if python github_update_pharmacy_cache.py; then
              exit 0
            fi
            sleep 25
          done
          exit 1

      - name: Verify cache date
        env:
          TZ: Europe/Istanbul
        run: |
          python - <<'PY'
          import json
          from datetime import datetime
          from zoneinfo import ZoneInfo
          today = datetime.now(ZoneInfo("Europe/Istanbul")).strftime("%Y-%m-%d")
          data = json.load(open("bitlis_pharmacy_cache.json", encoding="utf-8"))
          got = data.get("date")
          print(f"cache date={got} expected={today} total={data.get('total')}")
          MIN_TOTAL = 7
          if not data.get("ok") or int(data.get("total") or 0) < MIN_TOTAL:
              raise SystemExit(
                  f"cache eksik veya ok=false (total={data.get('total')}, min={MIN_TOTAL})"
              )
          keys = {
              d.get("key")
              for d in (data.get("districts") or [])
              if int(d.get("count") or 0) >= 1
          }
          need = {"merkez", "mutki", "ahlat", "adilcevaz", "guroymak", "hizan", "tatvan"}
          if not need.issubset(keys):
              raise SystemExit(f"eksik ilce: {sorted(need - keys)}")
          if got != today:
              raise SystemExit(f"tarih uyumsuz: {got} != {today}")
          PY

      - name: Commit and push cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bitlis_pharmacy_cache.json
          if git diff --staged --quiet; then
            echo "Cache zaten guncel (icerik ayni)."
            exit 0
          fi
          git commit -m "chore: nobetci eczane cache $(TZ=Europe/Istanbul date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
